const LS={
  get:async(k,fallback)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fallback}catch{return fallback}},
  set:async(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};

// ═══ API helpers ═══
const api={
  async call(action,payload={}){
    if(!API_URL)return null;
    try{
      const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action,...payload}),});
      return await r.json();
    }catch(e){console.warn("API:",e);return null;}
  },
  getRecords:()=>api.call("getRecords"),
  saveRecord:(record)=>api.call("saveRecord",{record}),
  deleteRecord:(id)=>api.call("deleteRecord",{id}),
  updateIssue:(recordId,issueIdx,field,value)=>api.call("updateIssue",{recordId,issueIdx,field,value}),
  getConfig:()=>api.call("getConfig"),
  saveConfig:(config)=>api.call("saveConfig",{config}),
  getUsers:()=>api.call("getUsers"),
  saveUsers:(users)=>api.call("saveUsers",{users}),
};

// ═══ LOGIN ═══
function LoginScreen({users,onLogin,syncing,useCloud}){
  const[selectedUser,setSelectedUser]=useState(null);
  const[pin,setPin]=useState("");
  const[error,setError]=useState("");
  const handleLogin=()=>{
    if(!selectedUser)return;
    const user=users.find(u=>u.id===selectedUser);
    if(!user)return;
    if(String(user.pin).padStart(4,'0')!==pin){setError("密碼錯誤");setPin("");return;}
    onLogin(user);
  };
  return <div style={{background:"var(--bg)",color:"var(--text)",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{width:"100%",maxWidth:360}} className="fade-in">
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{width:64,height:64,borderRadius:20,background:"linear-gradient(135deg,#60a5fa,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 16px",boxShadow:"0 8px 32px #60a5fa33"}}>🔍</div>
        <div style={{fontSize:10,fontWeight:300,color:"var(--blue)",letterSpacing:4,textTransform:"uppercase",marginBottom:4}}>Manufacturing Observation</div>
        <h1 style={{fontSize:22,fontWeight:900,color:"#f0f0f0"}}>製造作業觀察系統</h1>
        {useCloud&&<div style={{fontSize:10,color:"var(--green)",marginTop:8}}>☁ 已連接 Google Sheets 雲端資料庫</div>}
        {syncing&&<div style={{fontSize:11,color:"var(--yellow)",marginTop:8}}>⏳ 正在同步資料...</div>}
      </div>
      <div style={{background:"var(--card)",borderRadius:16,padding:24,border:"1px solid var(--border)"}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:"#aaa"}}>選擇身份</div>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
          {users.map(u=><button key={u.id} onClick={()=>{setSelectedUser(u.id);setError("");setPin("");}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:10,border:selectedUser===u.id?`2px solid ${ROLES[u.role]?.color||"#888"}`:"1px solid #333",background:selectedUser===u.id?(ROLES[u.role]?.color||"#888")+"12":"transparent",cursor:"pointer",color:"var(--text)",fontSize:13}}>
            <span style={{fontWeight:selectedUser===u.id?700:400}}>{u.name}</span>
            <span style={{fontSize:10,color:ROLES[u.role]?.color||"#888",background:(ROLES[u.role]?.color||"#888")+"20",padding:"2px 8px",borderRadius:99}}>{ROLES[u.role]?.label||u.role}</span>
          </button>)}
        </div>
        {selectedUser&&<div>
          <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:"#aaa"}}>輸入PIN碼</div>
          <div style={{display:"flex",gap:8}}>
            <input type="password" inputMode="numeric" maxLength={4} value={pin} onChange={e=>{setPin(e.target.value.replace(/\D/g,""));setError("");}} placeholder="4位數字" style={{...S.input,flex:1,fontSize:18,textAlign:"center",letterSpacing:12}} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            <button onClick={handleLogin} style={{...S.btn,width:64,borderRadius:10,fontSize:14}}>→</button>
          </div>
          {error&&<div style={{color:"var(--red)",fontSize:12,marginTop:8,textAlign:"center"}}>{error}</div>}
        </div>}
      </div>
      <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"#444"}}>預設PIN：管理者 0000 ／班長 1111~5555</div>
    </div>
  </div>;
}

// ═══ SETTINGS ═══
function ListManager({title,items,onUpdate,placeholder,icon}){
  const[newItem,setNewItem]=useState("");
  const[editIdx,setEditIdx]=useState(-1);
  const[editVal,setEditVal]=useState("");
  const handleAdd=()=>{const v=newItem.trim();if(!v||items.includes(v))return;onUpdate([...items,v]);setNewItem("");};
  const handleDelete=(idx)=>{if(items.length<=1)return;if(!confirm(`確定刪除「${items[idx]}」？`))return;onUpdate(items.filter((_,i)=>i!==idx));};
  const handleMove=(idx,dir)=>{const ni=idx+dir;if(ni<0||ni>=items.length)return;const u=[...items];[u[idx],u[ni]]=[u[ni],u[idx]];onUpdate(u);};
  return <div>
    <SectionTitle>{icon} {title}</SectionTitle>
    <div style={{background:"var(--card)",borderRadius:12,overflow:"hidden"}}>
      {items.map((item,idx)=><div key={idx} style={{display:"flex",alignItems:"center",padding:"10px 12px",borderBottom:"1px solid #ffffff06",gap:8}}>
        <span style={{fontSize:11,color:"#555",width:20,textAlign:"center",flexShrink:0}}>{idx+1}</span>
        {editIdx===idx?<div style={{display:"flex",flex:1,gap:6}}>
          <input value={editVal} onChange={e=>setEditVal(e.target.value)} style={{...S.input,flex:1,padding:"6px 10px",fontSize:12}} onKeyDown={e=>e.key==="Enter"&&(()=>{const v=editVal.trim();if(!v)return;const u=[...items];u[editIdx]=v;onUpdate(u);setEditIdx(-1);})()}autoFocus/>
          <button onClick={()=>{const v=editVal.trim();if(!v)return;const u=[...items];u[editIdx]=v;onUpdate(u);setEditIdx(-1);}} style={{...S.btnSm,color:"var(--green)",background:"#22c55e15"}}>✓</button>
          <button onClick={()=>setEditIdx(-1)} style={S.btnSm}>✕</button>
        </div>:<>
          <span style={{flex:1,fontSize:13,fontWeight:500}}>{item}</span>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>handleMove(idx,-1)} style={{...S.btnMini,opacity:idx===0?.3:1}} disabled={idx===0}>↑</button>
            <button onClick={()=>handleMove(idx,1)} style={{...S.btnMini,opacity:idx===items.length-1?.3:1}} disabled={idx===items.length-1}>↓</button>
            <button onClick={()=>{setEditIdx(idx);setEditVal(item);}} style={S.btnMini}>✏️</button>
            <button onClick={()=>handleDelete(idx)} style={{...S.btnMini,color:"var(--red)"}}>🗑</button>
          </div>
        </>}
      </div>)}
      <div style={{display:"flex",gap:8,padding:12}}>
        <input value={newItem} onChange={e=>setNewItem(e.target.value)} placeholder={placeholder} style={{...S.input,flex:1,padding:"8px 12px",fontSize:12}} onKeyDown={e=>e.key==="Enter"&&handleAdd()}/>
        <button onClick={handleAdd} style={{...S.btn,width:"auto",padding:"8px 16px",fontSize:12,borderRadius:8}}>＋ 新增</button>
      </div>
    </div>
  </div>;
}

// ═══ DASHBOARD ═══
function Dashboard({records,filterStation,setFilterStation,filterDateFrom,setFilterDateFrom,filterDateTo,setFilterDateTo,stations}){
  const totalObs=records.length;
  const allIssues=records.flatMap(r=>r.issues||[]);
  const totalIssues=allIssues.length;
  const improved=allIssues.filter(i=>i.status==="已改善").length;
  const pending=allIssues.filter(i=>i.status==="未改善").length;
  const stationIssues={};
  records.forEach(r=>{if(!stationIssues[r.station])stationIssues[r.station]={total:0,improved:0,pending:0,inProgress:0};(r.issues||[]).forEach(i=>{stationIssues[r.station].total++;if(i.status==="已改善")stationIssues[r.station].improved++;else if(i.status==="未改善")stationIssues[r.station].pending++;else stationIssues[r.station].inProgress++;});});
  const itemIssues={};
  records.forEach(r=>{Object.entries(r.checks||{}).forEach(([k,v])=>{if(!itemIssues[k])itemIssues[k]={fail:0,pass:0};if(v==="X")itemIssues[k].fail++;else if(v==="O")itemIssues[k].pass++;});});
  const sortedItems=Object.entries(itemIssues).sort((a,b)=>b[1].fail-a[1].fail).filter(([,v])=>v.fail>0);
  const compDist={A:0,B:0,C:0,D:0};
  records.forEach(r=>{if(r.compliance&&compDist[r.compliance]!==undefined)compDist[r.compliance]++;});

  return <div className="fade-in">
    <FilterBar filterStation={filterStation} setFilterStation={setFilterStation} filterDateFrom={filterDateFrom} setFilterDateFrom={setFilterDateFrom} filterDateTo={filterDateTo} setFilterDateTo={setFilterDateTo} stations={stations}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
      <StatCard label="觀察總次數" value={totalObs} color="var(--blue)"/>
      <StatCard label="發掘問題點" value={totalIssues} color="var(--yellow)"/>
      <StatCard label="已改善" value={improved} color="var(--green)"/>
      <StatCard label="未改善" value={pending} color="var(--red)"/>
    </div>
    <SectionTitle>遵守度分布</SectionTitle>
    <div style={{display:"flex",gap:8,marginBottom:20}}>
      {Object.entries(compDist).map(([g,c])=><div key={g} style={{flex:1,background:"var(--card)",borderRadius:12,padding:"12px 8px",textAlign:"center",border:`1px solid ${CC[g]}30`}}><div style={{fontSize:24,fontWeight:900,color:CC[g]}}>{c}</div><div style={{fontSize:12,color:"#888",marginTop:2}}>{g}級</div></div>)}
    </div>
    <SectionTitle>各工站問題數</SectionTitle>
    <div style={{background:"var(--card)",borderRadius:12,padding:16,marginBottom:20}}>
      {Object.entries(stationIssues).length===0&&<div style={{color:"#555",fontSize:13}}>尚無資料</div>}
      {Object.entries(stationIssues).map(([st,v])=>{const max=Math.max(...Object.values(stationIssues).map(x=>x.total),1);return <div key={st} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{fontWeight:600}}>{st}</span><span style={{color:"#888"}}>{v.total}件</span></div><div style={{display:"flex",height:18,borderRadius:9,overflow:"hidden",background:"var(--bg)"}}>{v.improved>0&&<div style={{width:`${(v.improved/max)*100}%`,background:SC.improved,transition:"width .5s"}}/>}{v.inProgress>0&&<div style={{width:`${(v.inProgress/max)*100}%`,background:SC.inProgress,transition:"width .5s"}}/>}{v.pending>0&&<div style={{width:`${(v.pending/max)*100}%`,background:SC.pending,transition:"width .5s"}}/>}</div></div>;})}
      <div style={{display:"flex",gap:16,marginTop:8,fontSize:10,color:"#888"}}>{["已改善","改善中","未改善"].map(k=><span key={k} style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:4,background:k==="已改善"?SC.improved:k==="改善中"?SC.inProgress:SC.pending,display:"inline-block"}}/>{k}</span>)}</div>
    </div>
    <SectionTitle>問題項目排行</SectionTitle>
    <div style={{background:"var(--card)",borderRadius:12,padding:16}}>
      {sortedItems.length===0&&<div style={{color:"#555",fontSize:13}}>尚無問題</div>}
      {sortedItems.map(([key,v],i)=>{const item=CHECK_ITEMS.find(c=>c.id===key);const total=v.fail+v.pass;const pct=total>0?Math.round((v.fail/total)*100):0;return <div key={key} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:22,height:22,borderRadius:11,background:i===0?"var(--red)":i===1?"var(--yellow)":"#333",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item?.label||key}</div><div style={{height:6,borderRadius:3,background:"var(--bg)",marginTop:4}}><div style={{height:6,borderRadius:3,background:"linear-gradient(90deg,#ef4444,#f59e0b)",width:`${pct}%`,transition:"width .5s"}}/></div></div><div style={{fontSize:12,fontWeight:700,color:"var(--red)",flexShrink:0}}>{v.fail}<span style={{color:"#555",fontWeight:400}}>/{total}</span></div></div>;})}
    </div>
  </div>;
}

  const[statusFilter,setStatusFilter]=useState("全部");
  const shown=statusFilter==="全部"?allIssues:allIssues.filter(i=>i.status===statusFilter);
  return <div className="fade-in">
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
      <select value={filterStation} onChange={e=>setFilterStation(e.target.value)} style={S.sel}><option value="全部">全部工站</option>{stations.map(s=><option key={s}>{s}</option>)}</select>
      <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={S.sel}><option value="全部">全部狀態</option><option>已改善</option><option>改善中</option><option>未改善</option></select>
    </div>
    {shown.length===0&&<div style={{textAlign:"center",color:"#555",padding:40}}>無符合條件的問題</div>}
    {shown.map((iss,i)=>{const it=CHECK_ITEMS.find(c=>c.id===iss.item);const sc=iss.status==="已改善"?SC.improved:iss.status==="改善中"?SC.inProgress:SC.pending;return <div key={i} style={{background:"var(--card)",borderRadius:12,padding:14,marginBottom:10,borderLeft:`3px solid ${sc}`}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:700}}>{it?.label||iss.item}</span>{perm?.canEditIssue?<select value={iss.status} onChange={e=>onUpdateIssue(iss.recordId,iss.issueIdx,"status",e.target.value)} style={{...S.sel,fontSize:11,padding:"2px 8px",color:sc,background:"var(--bg)"}}><option>未改善</option><option>改善中</option><option>已改善</option></select>:<span style={{fontSize:11,color:sc,fontWeight:600}}>{iss.status}</span>}</div>
      <div style={{fontSize:11,color:"#888",marginBottom:4}}>{iss.station} · {iss.date} · {iss.operator}</div>
      <div style={{fontSize:12,color:"#ccc",marginBottom:8}}>{iss.desc||"（無描述）"}</div>
      {perm?.canEditIssue?<><input type="date" value={iss.improveDate||""} onChange={e=>onUpdateIssue(iss.recordId,iss.issueIdx,"improveDate",e.target.value)} style={{...S.sel,width:"100%",fontSize:11,boxSizing:"border-box"}}/><input value={iss.improveNote||""} onChange={e=>onUpdateIssue(iss.recordId,iss.issueIdx,"improveNote",e.target.value)} placeholder="改善對策說明..." style={{...S.sel,width:"100%",marginTop:6,fontSize:12,boxSizing:"border-box"}}/></>:<>{iss.improveDate&&<div style={{fontSize:11,color:"#666"}}>預計改善: {iss.improveDate}</div>}{iss.improveNote&&<div style={{fontSize:12,color:"#888",marginTop:4}}>{iss.improveNote}</div>}</>}
    </div>;})}
  </div>;
}

function RecordForm({record,onSave,currentUser,stations,supervisors}){
  const blank={date:td(),station:stations[0]||"",carModel:"",partName:"",operator:"",personnelChange:false,checks:Object.fromEntries(CHECK_ITEMS.map(c=>[c.id,"O"])),compliance:"A",supervisor:currentUser?.name||supervisors[0]||"",managerConfirm:false,issues:[]};

      <Field label="車型"><input value={form.carModel} onChange={e=>set("carModel",e.target.value)} placeholder="例: CX-5" style={S.input}/></Field>
      <Field label="零件名稱"><input value={form.partName} onChange={e=>set("partName",e.target.value)} placeholder="例: 前保桿" style={S.input}/></Field>
      <Field label="作業人員"><input value={form.operator} onChange={e=>set("operator",e.target.value)} placeholder="例: 陳OO" style={S.input}/></Field>

      <button onClick={()=>setStep(1)} style={S.btn}>下一步 →</button>
    </div>}
    {step===1&&<div>
      <div style={{fontSize:11,color:"#888",marginBottom:12,display:"flex",justifyContent:"flex-end",gap:12}}><span style={{color:"var(--green)"}}>O 落實</span><span>— 無此工序</span><span style={{color:"var(--red)"}}>X 未落實</span></div>
      {CHECK_ITEMS.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #ffffff06"}}><span style={{fontSize:12,flex:1,paddingRight:8}}>{item.label}</span><div style={{display:"flex",gap:4,flexShrink:0}}>{["O","一","X"].map(v=><button key={v} onClick={()=>setCheck(item.id,v)} style={{width:36,height:36,borderRadius:8,border:form.checks[item.id]===v?`2px solid ${v==="O"?"var(--green)":v==="X"?"var(--red)":"#666"}`:"1px solid #333",background:form.checks[item.id]===v?(v==="O"?"#22c55e20":v==="X"?"#ef444420":"#33333380"):"transparent",color:v==="O"?"var(--green)":v==="X"?"var(--red)":"#888",fontSize:14,fontWeight:700,cursor:"pointer"}}>{v}</button>)}</div></div>)}
      <Field label="作業遵守度" style={{marginTop:16}}><div style={{display:"flex",gap:8}}>{["A","B","C","D"].map(g=><button key={g} onClick={()=>set("compliance",g)} style={{flex:1,padding:"10px 0",borderRadius:8,border:form.compliance===g?`2px solid ${CC[g]}`:"1px solid #333",background:form.compliance===g?CC[g]+"25":"transparent",color:CC[g],fontSize:16,fontWeight:900,cursor:"pointer"}}>{g}</button>)}</div></Field>

      <div style={{display:"flex",gap:8}}><button onClick={()=>setStep(1)} style={{...S.btn,background:"#333",color:"#aaa",flex:1}}>← 上一步</button><button onClick={()=>onSave(form)} style={{...S.btn,flex:1,background:"var(--green)"}}>💾 儲存紀錄</button></div>
    </div>}
  </div>;
}

// ═══ MAIN APP ═══
function App(){
  const[currentUser,setCurrentUser]=useState(null);
  const[users,setUsers]=useState([]);
  const[records,setRecords]=useState([]);
  const[stations,setStations]=useState(DEFAULT_STATIONS);
  const[supervisors,setSupervisors]=useState(DEFAULT_SUPERVISORS);
  const[page,setPage]=useState("dashboard");
  const[editingRecord,setEditingRecord]=useState(null);
  const[filterStation,setFilterStation]=useState("全部");
  const[filterDateFrom,setFilterDateFrom]=useState("");
  const[filterDateTo,setFilterDateTo]=useState("");
  const[toast,setToast]=useState("");
  const[syncing,setSyncing]=useState(false);
  const useCloud=!!API_URL;

  useEffect(()=>{(async()=>{
    if(useCloud){
      setSyncing(true);
      const[recs,cfg,usrs]=await Promise.all([api.getRecords(),api.getConfig(),api.getUsers()]);
      if(recs?.records)setRecords(recs.records);
      if(cfg?.stations)setStations(cfg.stations);
      if(cfg?.supervisors)setSupervisors(cfg.supervisors);
      if(usrs?.users?.length)setUsers(usrs.users.map(u=>({...u,pin:String(u.pin).padStart(4,'0')})));else setUsers(DEFAULT_USERS);
      setSyncing(false);
    }else{
      setRecords(await LS.get("obs-rec",DEMO_DATA));
      const lsUsers=await LS.get("obs-usr",DEFAULT_USERS);setUsers(lsUsers.map(u=>({...u,pin:String(u.pin).padStart(4,'0')})));
      const cfg=await LS.get("obs-cfg",{});
      if(cfg.stations)setStations(cfg.stations);
      if(cfg.supervisors)setSupervisors(cfg.supervisors);
    }
  })();},[]);

  const saveRec=useCallback(async d=>{if(!useCloud)await LS.set("obs-rec",d);},[useCloud]);
  const saveUsr=useCallback(async d=>{if(useCloud)await api.saveUsers(d);else await LS.set("obs-usr",d);},[useCloud]);
  const saveCfg=useCallback(async(st,sv)=>{const c={stations:st,supervisors:sv};if(useCloud)await api.saveConfig(c);else await LS.set("obs-cfg",c);},[useCloud]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2200);};
  const perm=currentUser?ROLES[currentUser.role]:null;

  const filtered=useMemo(()=>records.filter(r=>{
    if(filterStation!=="全部"&&r.station!==filterStation)return false;
    if(filterDateFrom&&r.date<filterDateFrom)return false;
    if(filterDateTo&&r.date>filterDateTo)return false;
    return true;
  }),[records,filterStation,filterDateFrom,filterDateTo]);

  const handleSaveRecord=async rec=>{
    let updated;
    if(rec.id&&records.some(r=>r.id===rec.id)){updated=records.map(r=>r.id===rec.id?rec:r);}
    else{rec.id=Date.now();rec.createdBy=currentUser?.id||"unknown";updated=[...records,rec];}
    setRecords(updated);
    if(useCloud)await api.saveRecord(rec);else await saveRec(updated);
    showToast("紀錄已儲存 ✓");setPage("records");setEditingRecord(null);
  };
  const handleDelete=async id=>{const u=records.filter(r=>r.id!==id);setRecords(u);if(useCloud)await api.deleteRecord(id);else await saveRec(u);showToast("已刪除");};
  const handleUpdateIssue=async(recordId,issueIdx,field,value)=>{
    const updated=records.map(r=>{if(r.id===recordId){const issues=[...r.issues];issues[issueIdx]={...issues[issueIdx],[field]:value};return{...r,issues};}return r;});
    setRecords(updated);if(useCloud)await api.updateIssue(recordId,issueIdx,field,value);else await saveRec(updated);
  };
  const handleUpdateStations=ns=>{setStations(ns);saveCfg(ns,supervisors);showToast("工站已更新");};
  const handleUpdateSupervisors=ns=>{
    const oldSv=supervisors;
    // Find added names
    const added=ns.filter(n=>!oldSv.includes(n));
    // Find removed names
    const removed=oldSv.filter(n=>!ns.includes(n));
    // Find renamed (same index, different name)
    const renamed=[];
    oldSv.forEach((old,i)=>{if(ns[i]&&ns[i]!==old&&!added.includes(ns[i])&&!removed.includes(old))renamed.push({from:old,to:ns[i]});});

    let updatedUsers=[...users];
    // Remove users for removed supervisors
    removed.forEach(name=>{updatedUsers=updatedUsers.filter(u=>u.name!==name||u.role!=="supervisor");});
    // Add users for new supervisors
    added.forEach((name,i)=>{
      if(!updatedUsers.some(u=>u.name===name)){
        const pin=String(1000+updatedUsers.length+i).slice(-4);
        updatedUsers.push({id:"u"+Date.now()+i,name,pin,role:"supervisor"});
      }
    });
    // Rename users for renamed supervisors
    renamed.forEach(({from,to})=>{updatedUsers=updatedUsers.map(u=>u.name===from&&u.role==="supervisor"?{...u,name:to}:u);});

    setUsers(updatedUsers);saveUsr(updatedUsers);
    setSupervisors(ns);saveCfg(stations,ns);
    showToast("幹部名單與帳號已同步更新");
  };
  const handleReset=async()=>{if(!confirm("確定要重置所有資料？"))return;setRecords(DEMO_DATA);setUsers(DEFAULT_USERS);setStations(DEFAULT_STATIONS);setSupervisors(DEFAULT_SUPERVISORS);if(!useCloud){await saveRec(DEMO_DATA);await saveUsr(DEFAULT_USERS);await saveCfg(DEFAULT_STATIONS,DEFAULT_SUPERVISORS);}showToast("已重置");};
  const handleAddUser=u=>{const n=[...users,{...u,id:"u"+Date.now()}];setUsers(n);saveUsr(n);showToast("已新增帳號");};
  const handleDeleteUser=id=>{if(id==="admin")return showToast("無法刪除系統管理者");const n=users.filter(x=>x.id!==id);setUsers(n);saveUsr(n);showToast("已刪除帳號");};
  const handleUpdateUser=(id,upd)=>{const n=users.map(x=>x.id===id?{...x,...upd}:x);setUsers(n);saveUsr(n);showToast("已更新");};

  if(!currentUser)return <LoginScreen users={users} onLogin={setCurrentUser} syncing={syncing} useCloud={useCloud}/>;

  const navItems=[["dashboard","📊 儀表板",true],["records","📋 紀錄",true],["issues","⚠️ 改善",true],["add","＋ 新增",perm?.canAdd],...(perm?.canManageUsers?[["users","👤 帳號",true]]:[]),...(perm?.canSettings?[["settings","⚙ 設定",true]]:[])].filter(x=>x[2]);

  return <div style={{background:"var(--bg)",color:"var(--text)",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"}}>
    {toast&&<div className="toast-anim" style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"var(--green)",color:"#fff",padding:"10px 24px",borderRadius:99,fontSize:14,fontWeight:600,zIndex:999,boxShadow:"0 4px 20px #22c55e55",whiteSpace:"nowrap"}}>{toast}</div>}
    <header style={{background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)",padding:"16px 16px 10px",borderBottom:"1px solid var(--border)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:10,fontWeight:300,color:"var(--blue)",letterSpacing:3,textTransform:"uppercase"}}>Manufacturing Observation</div><h1 style={{fontSize:18,fontWeight:900,margin:"2px 0 0",background:"linear-gradient(90deg,#f0f0f0,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>製造作業觀察系統</h1></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:600}}>{currentUser.name}</div><div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end",marginTop:2}}>{useCloud&&<span style={{fontSize:9,color:"var(--green)",background:"#22c55e20",padding:"1px 6px",borderRadius:99}}>☁ 雲端</span>}<span style={{fontSize:10,color:ROLES[currentUser.role].color,background:ROLES[currentUser.role].color+"20",padding:"1px 8px",borderRadius:99,fontWeight:600}}>{ROLES[currentUser.role].label}</span><button onClick={()=>{setCurrentUser(null);setPage("dashboard");}} style={{fontSize:10,color:"var(--red)",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>登出</button></div></div>
      </div>
    </header>
    <nav style={{display:"flex",background:"#16182a",borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
      {navItems.map(([k,l])=><button key={k} onClick={()=>{setPage(k);if(k==="add")setEditingRecord(null);}} style={{flex:1,padding:"11px 2px",fontSize:11,fontWeight:page===k?700:400,background:page===k?"#60a5fa15":"transparent",color:page===k?"var(--blue)":"#888",border:"none",borderBottom:page===k?"2px solid var(--blue)":"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap",minWidth:0}}>{l}</button>)}
    </nav>
    <main style={{padding:16,paddingBottom:60}}>
      {page==="dashboard"&&<Dashboard records={filtered} filterStation={filterStation} setFilterStation={setFilterStation} filterDateFrom={filterDateFrom} setFilterDateFrom={setFilterDateFrom} filterDateTo={filterDateTo} setFilterDateTo={setFilterDateTo} stations={stations}/>}
      {page==="records"&&<RecordList records={filtered} filterStation={filterStation} setFilterStation={setFilterStation} onEdit={r=>{setEditingRecord(r);setPage("add");}} onDelete={handleDelete} perm={perm} users={users} stations={stations}/>}
      {page==="issues"&&<IssueTracker records={records} onUpdateIssue={handleUpdateIssue} filterStation={filterStation} setFilterStation={setFilterStation} perm={perm} stations={stations}/>}
      {page==="add"&&<RecordForm record={editingRecord} onSave={handleSaveRecord} currentUser={currentUser} stations={stations} supervisors={supervisors}/>}
      {page==="users"&&<UserManager users={users} onAdd={handleAddUser} onDelete={handleDeleteUser} onUpdate={handleUpdateUser}/>}
      {page==="settings"&&<SettingsPage stations={stations} supervisors={supervisors} onUpdateStations={handleUpdateStations} onUpdateSupervisors={handleUpdateSupervisors} onReset={handleReset} useCloud={useCloud}/>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

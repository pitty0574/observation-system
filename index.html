<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>製造作業觀察系統</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f1117;--card:#1a1d2e;--border:#ffffff08;--text:#e4e4e7;--sub:#888;--blue:#60a5fa;--purple:#a78bfa;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--input-bg:#0f1117}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC','Helvetica Neue',sans-serif}
input,select,button,textarea{font-family:inherit}
input[type="date"]{color-scheme:dark}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideToast{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes cardIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.fade-in{animation:fadeIn .3s ease}.toast-anim{animation:slideToast .3s ease}.card-anim{animation:cardIn .25s ease}
</style>
</head>

};
const DEFAULT_USERS=[
  {id:"admin",name:"系統管理者",pin:"0000",role:"manager"},
  {id:"wang",name:"王班長",pin:"1111",role:"supervisor"},
  {id:"li",name:"李班長",pin:"2222",role:"supervisor"},
  {id:"zhang",name:"張班長",pin:"3333",role:"supervisor"},
  {id:"chen",name:"陳班長",pin:"4444",role:"supervisor"},
  {id:"lin",name:"林班長",pin:"5555",role:"supervisor"},
];
const DEMO_DATA=[];
const SC={improved:"#22c55e",inProgress:"#f59e0b",pending:"#ef4444"};
const CC={A:"#22c55e",B:"#60a5fa",C:"#f59e0b",D:"#ef4444"};
const td=()=>new Date().toISOString().split("T")[0];

const LS={
  get:async(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}},
  set:async(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};

/* ═══ API - 修正 Google Sheets 同步 ═══ */
const api={
  async call(action,payload={}){
    if(!API_URL)return null;
    try{
      const r=await fetch(API_URL,{
        method:"POST",
        redirect:"follow",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({action,...payload}),
      });
      const text=await r.text();
      try{return JSON.parse(text);}catch{console.warn("API non-JSON:",text.slice(0,200));return null;}
    }catch(e){console.error("API error:",action,e);return null;}
  },
  getRecords:()=>api.call("getRecords"),
  saveRecord:r=>api.call("saveRecord",{record:r}),
  deleteRecord:id=>api.call("deleteRecord",{id}),
  updateIssue:(a,b,c,d)=>api.call("updateIssue",{recordId:a,issueIdx:b,field:c,value:d}),
  getConfig:()=>api.call("getConfig"),
  saveConfig:c=>api.call("saveConfig",{config:c}),
  getUsers:()=>api.call("getUsers"),
  saveUsers:u=>api.call("saveUsers",{users:u}),
};

const S={
  sel:{background:"var(--card)",color:"var(--text)",border:"1px solid #333",borderRadius:8,padding:"8px 10px",fontSize:12,outline:"none"},
  input:{background:"var(--input-bg)",color:"var(--text)",border:"1px solid #333",borderRadius:8,padding:"10px 12px",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"},
  btn:{background:"var(--blue)",color:"#fff",border:"none",borderRadius:10,padding:"12px 0",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%"},
  btnSm:{background:"#60a5fa15",color:"var(--blue)",border:"none",borderRadius:6,padding:"4px 12px",fontSize:11,cursor:"pointer"},
  btnMini:{background:"none",border:"none",color:"#888",fontSize:14,cursor:"pointer",padding:"2px 6px"},
};

function StatCard({label,value,color}){return <div className="fade-in" style={{background:"var(--card)",borderRadius:12,padding:"16px 14px",borderLeft:`3px solid ${color}`}}><div style={{fontSize:28,fontWeight:900,color}}>{value}</div><div style={{fontSize:11,color:"#888",marginTop:2}}>{label}</div></div>}
function SectionTitle({children}){return <div style={{fontSize:13,fontWeight:700,color:"#aaa",marginBottom:10,letterSpacing:1}}>{children}</div>}
function Field({label,children,style}){return <div style={style}><div style={{fontSize:12,color:"#888",marginBottom:4}}>{label}</div>{children}</div>}

function FilterBar({filterStation,setFilterStation,filterDateFrom,setFilterDateFrom,filterDateTo,setFilterDateTo,stations}){
  return <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
    <select value={filterStation} onChange={e=>setFilterStation(e.target.value)} style={S.sel}><option value="全部">全部工站</option>{stations.map(s=><option key={s}>{s}</option>)}</select>
    <input type="date" value={filterDateFrom} onChange={e=>setFilterDateFrom(e.target.value)} style={{...S.sel,flex:1}}/>
    <input type="date" value={filterDateTo} onChange={e=>setFilterDateTo(e.target.value)} style={{...S.sel,flex:1}}/>
  </div>;
}

/* ═══ LOGIN ═══ */
function LoginScreen({users,onLogin,syncing,useCloud}){
  const[sel,setSel]=useState(null);const[pin,setPin]=useState("");const[err,setErr]=useState("");
  const go=()=>{if(!sel)return;const u=users.find(x=>x.id===sel);if(!u)return;if(String(u.pin).padStart(4,'0')!==pin){setErr("密碼錯誤");setPin("");return;}onLogin(u);};
  return <div style={{background:"var(--bg)",color:"var(--text)",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{width:"100%",maxWidth:360}} className="fade-in">
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{width:64,height:64,borderRadius:20,background:"linear-gradient(135deg,#60a5fa,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 16px",boxShadow:"0 8px 32px #60a5fa33"}}>🔍</div>
        <div style={{fontSize:10,fontWeight:300,color:"var(--blue)",letterSpacing:4,textTransform:"uppercase",marginBottom:4}}>Manufacturing Observation</div>
        <h1 style={{fontSize:22,fontWeight:900,color:"#f0f0f0"}}>製造作業觀察系統</h1>
        {useCloud&&<div style={{fontSize:10,color:"var(--green)",marginTop:8}}>☁ 已連接 Google Sheets</div>}
        {syncing&&<div style={{fontSize:11,color:"var(--yellow)",marginTop:8}}>⏳ 同步中...</div>}
      </div>
      <div style={{background:"var(--card)",borderRadius:16,padding:24,border:"1px solid var(--border)"}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:"#aaa"}}>選擇身份</div>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20}}>
          {users.map(u=><button key={u.id} onClick={()=>{setSel(u.id);setErr("");setPin("");}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:10,border:sel===u.id?`2px solid ${ROLES[u.role]?.color||"#888"}`:"1px solid #333",background:sel===u.id?(ROLES[u.role]?.color||"#888")+"12":"transparent",cursor:"pointer",color:"var(--text)",fontSize:13}}>
            <span style={{fontWeight:sel===u.id?700:400}}>{u.name}</span>
            <span style={{fontSize:10,color:ROLES[u.role]?.color||"#888",background:(ROLES[u.role]?.color||"#888")+"20",padding:"2px 8px",borderRadius:99}}>{ROLES[u.role]?.label||u.role}</span>
          </button>)}
        </div>
        {sel&&<div>
          <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:"#aaa"}}>輸入PIN碼</div>
          <div style={{display:"flex",gap:8}}>
            <input type="password" inputMode="numeric" maxLength={4} value={pin} onChange={e=>{setPin(e.target.value.replace(/\D/g,""));setErr("");}} placeholder="4位數字" style={{...S.input,flex:1,fontSize:18,textAlign:"center",letterSpacing:12}} onKeyDown={e=>e.key==="Enter"&&go()}/>
            <button onClick={go} style={{...S.btn,width:64,borderRadius:10,fontSize:14}}>→</button>
          </div>
          {err&&<div style={{color:"var(--red)",fontSize:12,marginTop:8,textAlign:"center"}}>{err}</div>}
        </div>}
      </div>
      <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"#444"}}>預設PIN：管理者 0000 ／班長 1111~5555</div>
    </div>
  </div>;
}

/* ═══ LIST MANAGER (for stations & check items) ═══ */
function ListManager({title,items,onUpdate,placeholder,icon,renderItem}){
  const[newItem,setNewItem]=useState("");const[editIdx,setEditIdx]=useState(-1);const[editVal,setEditVal]=useState("");
  const add=()=>{const v=newItem.trim();if(!v)return;onUpdate([...items,v]);setNewItem("");};
  const del=(i)=>{if(items.length<=1||!confirm(`確定刪除？`))return;onUpdate(items.filter((_,j)=>j!==i));};
  const mv=(i,d)=>{const n=i+d;if(n<0||n>=items.length)return;const u=[...items];[u[i],u[n]]=[u[n],u[i]];onUpdate(u);};
  const saveEdit=()=>{const v=editVal.trim();if(!v)return;const u=[...items];u[editIdx]=v;onUpdate(u);setEditIdx(-1);};
  return <div>
    <SectionTitle>{icon} {title}</SectionTitle>
    <div style={{background:"var(--card)",borderRadius:12,overflow:"hidden"}}>
      {items.map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",padding:"10px 12px",borderBottom:"1px solid #ffffff06",gap:8}}>
        <span style={{fontSize:11,color:"#555",width:20,textAlign:"center",flexShrink:0}}>{i+1}</span>
        {editIdx===i?<div style={{display:"flex",flex:1,gap:6}}>
          <input value={editVal} onChange={e=>setEditVal(e.target.value)} style={{...S.input,flex:1,padding:"6px 10px",fontSize:12}} onKeyDown={e=>e.key==="Enter"&&saveEdit()} autoFocus/>
          <button onClick={saveEdit} style={{...S.btnSm,color:"var(--green)",background:"#22c55e15"}}>✓</button>
          <button onClick={()=>setEditIdx(-1)} style={S.btnSm}>✕</button>
        </div>:<>
          <span style={{flex:1,fontSize:13,fontWeight:500}}>{renderItem?renderItem(item):item}</span>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>mv(i,-1)} style={{...S.btnMini,opacity:i===0?.3:1}} disabled={i===0}>↑</button>
            <button onClick={()=>mv(i,1)} style={{...S.btnMini,opacity:i===items.length-1?.3:1}} disabled={i===items.length-1}>↓</button>
            <button onClick={()=>{setEditIdx(i);setEditVal(typeof item==='string'?item:JSON.stringify(item));}} style={S.btnMini}>✏️</button>
            <button onClick={()=>del(i)} style={{...S.btnMini,color:"var(--red)"}}>🗑</button>
          </div>
        </>}
      </div>)}
      <div style={{display:"flex",gap:8,padding:12}}>
        <input value={newItem} onChange={e=>setNewItem(e.target.value)} placeholder={placeholder} style={{...S.input,flex:1,padding:"8px 12px",fontSize:12}} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button onClick={add} style={{...S.btn,width:"auto",padding:"8px 16px",fontSize:12,borderRadius:8}}>＋ 新增</button>
      </div>
    </div>
  </div>;
}

/* ═══ CHECK ITEMS EDITOR ═══ */
function CheckItemsEditor({items,onUpdate}){
  const[newLabel,setNewLabel]=useState("");const[newShort,setNewShort]=useState("");
  const[editIdx,setEditIdx]=useState(-1);const[editLabel,setEditLabel]=useState("");const[editShort,setEditShort]=useState("");
  const add=()=>{const l=newLabel.trim(),s=newShort.trim()||l.slice(0,4);if(!l)return;const id="ci"+Date.now();onUpdate([...items,{id,label:l,short:s}]);setNewLabel("");setNewShort("");};
  const del=(i)=>{if(items.length<=1||!confirm(`確定刪除「${items[i].label}」？`))return;onUpdate(items.filter((_,j)=>j!==i));};
  const mv=(i,d)=>{const n=i+d;if(n<0||n>=items.length)return;const u=[...items];[u[i],u[n]]=[u[n],u[i]];onUpdate(u);};
  return <div>
    <SectionTitle>📋 確認項目管理</SectionTitle>
    <div style={{background:"var(--card)",borderRadius:12,overflow:"hidden"}}>
      {items.map((item,i)=><div key={item.id} style={{display:"flex",alignItems:"center",padding:"10px 12px",borderBottom:"1px solid #ffffff06",gap:8}}>
        <span style={{fontSize:11,color:"#555",width:20,textAlign:"center",flexShrink:0}}>{i+1}</span>
        {editIdx===i?<div style={{display:"flex",flex:1,gap:4,flexWrap:"wrap"}}>
          <input value={editLabel} onChange={e=>setEditLabel(e.target.value)} placeholder="確認項目名稱" style={{...S.input,flex:2,padding:"6px 8px",fontSize:12,minWidth:120}}/>
          <input value={editShort} onChange={e=>setEditShort(e.target.value)} placeholder="簡稱" style={{...S.input,flex:1,padding:"6px 8px",fontSize:12,minWidth:60,maxWidth:80}}/>
          <button onClick={()=>{const l=editLabel.trim();if(!l)return;const u=[...items];u[i]={...u[i],label:l,short:editShort.trim()||l.slice(0,4)};onUpdate(u);setEditIdx(-1);}} style={{...S.btnSm,color:"var(--green)",background:"#22c55e15"}}>✓</button>
          <button onClick={()=>setEditIdx(-1)} style={S.btnSm}>✕</button>
        </div>:<>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.label}</div>
            <div style={{fontSize:10,color:"#555"}}>{item.short}</div>
          </div>
          <div style={{display:"flex",gap:4,flexShrink:0}}>
            <button onClick={()=>mv(i,-1)} style={{...S.btnMini,opacity:i===0?.3:1}} disabled={i===0}>↑</button>
            <button onClick={()=>mv(i,1)} style={{...S.btnMini,opacity:i===items.length-1?.3:1}} disabled={i===items.length-1}>↓</button>
            <button onClick={()=>{setEditIdx(i);setEditLabel(item.label);setEditShort(item.short);}} style={S.btnMini}>✏️</button>
            <button onClick={()=>del(i)} style={{...S.btnMini,color:"var(--red)"}}>🗑</button>
          </div>
        </>}
      </div>)}
      <div style={{padding:12}}>
        <div style={{display:"flex",gap:6}}>
          <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="新確認項目名稱" style={{...S.input,flex:2,padding:"8px 10px",fontSize:12}}/>
          <input value={newShort} onChange={e=>setNewShort(e.target.value)} placeholder="簡稱" style={{...S.input,flex:1,padding:"8px 10px",fontSize:12,maxWidth:80}}/>
          <button onClick={add} style={{...S.btn,width:"auto",padding:"8px 14px",fontSize:12,borderRadius:8}}>＋</button>
        </div>
      </div>
    </div>
  </div>;
}

/* ═══ SETTINGS ═══ */
function SettingsPage({stations,onUpdateStations,checkItems,onUpdateCheckItems,onReset,useCloud}){
  return <div className="fade-in">
    <div style={{background:useCloud?"#22c55e15":"#f59e0b15",borderRadius:12,padding:14,marginBottom:20,border:`1px solid ${useCloud?"#22c55e30":"#f59e0b30"}`}}>
      <div style={{fontSize:13,fontWeight:700,color:useCloud?"var(--green)":"var(--yellow)",marginBottom:4}}>{useCloud?"☁ 雲端模式":"📱 本機模式"}</div>
      <div style={{fontSize:11,color:"#888"}}>{useCloud?"資料儲存於 Google Sheets，所有人共用同一份資料":"資料僅儲存於此瀏覽器"}</div>
    </div>
    <ListManager title="工站管理" items={stations} onUpdate={onUpdateStations} placeholder="輸入新工站名稱" icon="🏭"/>
    <div style={{height:20}}/>
    <CheckItemsEditor items={checkItems} onUpdate={onUpdateCheckItems}/>
    <div style={{marginTop:16,background:"var(--card)",borderRadius:12,padding:16}}>
      <div style={{fontSize:12,color:"#888",lineHeight:1.8}}>💡 巡檢幹部帳號請至「👤 帳號」頁面管理</div>
    </div>
    <div style={{marginTop:30}}><SectionTitle>危險操作</SectionTitle><button onClick={onReset} style={{...S.btn,background:"var(--red)"}}>🔄 重置所有資料</button></div>
  </div>;
}

/* ═══ USER MANAGER ═══ */
function UserManager({users,onAdd,onDelete,onUpdate}){
  const[showAdd,setShowAdd]=useState(false);const[form,setForm]=useState({name:"",pin:"",role:"supervisor"});const[editingId,setEditingId]=useState(null);
  return <div className="fade-in">
    <SectionTitle>帳號管理</SectionTitle>
    <div style={{background:"var(--card)",borderRadius:12,padding:4,marginBottom:16}}>
      {users.map(u=><div key={u.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px",borderBottom:"1px solid #ffffff06"}}>
        <div><div style={{fontSize:13,fontWeight:600}}>{u.name}</div><span style={{fontSize:10,color:ROLES[u.role]?.color||"#888"}}>{ROLES[u.role]?.label||u.role}</span><span style={{fontSize:10,color:"#555",marginLeft:8}}>PIN: {String(u.pin).padStart(4,'0')}</span></div>
        <div style={{display:"flex",gap:6}}>
          {editingId===u.id?<div style={{display:"flex",gap:4,alignItems:"center"}}><select value={u.role} onChange={e=>onUpdate(u.id,{role:e.target.value})} style={{...S.sel,fontSize:11}}>{Object.entries(ROLES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select><button onClick={()=>setEditingId(null)} style={S.btnSm}>✓</button></div>:<>
            <button onClick={()=>setEditingId(u.id)} style={S.btnSm}>權限</button>
            {u.id!=="admin"&&<button onClick={()=>confirm(`刪除 ${u.name}？`)&&onDelete(u.id)} style={{...S.btnSm,color:"var(--red)",background:"#ef444415"}}>刪除</button>}
          </>}
        </div>
      </div>)}
    </div>
    {!showAdd?<button onClick={()=>setShowAdd(true)} style={{...S.btn,background:"var(--purple)"}}>＋ 新增帳號</button>:
    <div style={{background:"var(--card)",borderRadius:12,padding:16}}>
      <Field label="姓名"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={S.input} placeholder="例: 趙班長"/></Field>
      <Field label="PIN碼" style={{marginTop:10}}><input value={form.pin} onChange={e=>setForm(f=>({...f,pin:e.target.value.replace(/\D/g,"").slice(0,4)}))} style={S.input} placeholder="4位數字" inputMode="numeric" maxLength={4}/></Field>
      <Field label="角色" style={{marginTop:10}}><select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} style={S.input}>{Object.entries(ROLES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></Field>
      <div style={{display:"flex",gap:8,marginTop:14}}>
        <button onClick={()=>setShowAdd(false)} style={{...S.btn,background:"#333",color:"#aaa",flex:1}}>取消</button>
        <button onClick={()=>{if(form.name&&form.pin.length===4){onAdd(form);setForm({name:"",pin:"",role:"supervisor"});setShowAdd(false);}}} style={{...S.btn,flex:1,background:"var(--purple)"}}>確認新增</button>
      </div>
    </div>}
  </div>;
}

/* ═══ DASHBOARD ═══ */
function Dashboard({records,filterStation,setFilterStation,filterDateFrom,setFilterDateFrom,filterDateTo,setFilterDateTo,stations,checkItems}){
  const allIssues=records.flatMap(r=>r.issues||[]);
  const stationIssues={};records.forEach(r=>{if(!stationIssues[r.station])stationIssues[r.station]={total:0,improved:0,pending:0,inProgress:0};(r.issues||[]).forEach(i=>{stationIssues[r.station].total++;if(i.status==="已改善")stationIssues[r.station].improved++;else if(i.status==="未改善")stationIssues[r.station].pending++;else stationIssues[r.station].inProgress++;});});
  const itemIssues={};records.forEach(r=>{Object.entries(r.checks||{}).forEach(([k,v])=>{if(!itemIssues[k])itemIssues[k]={fail:0,pass:0};if(v==="X")itemIssues[k].fail++;else if(v==="O")itemIssues[k].pass++;});});
  const sortedItems=Object.entries(itemIssues).sort((a,b)=>b[1].fail-a[1].fail).filter(([,v])=>v.fail>0);
  const compDist={A:0,B:0,C:0,D:0};records.forEach(r=>{if(r.compliance&&compDist[r.compliance]!==undefined)compDist[r.compliance]++;});
  return <div className="fade-in">
    <FilterBar filterStation={filterStation} setFilterStation={setFilterStation} filterDateFrom={filterDateFrom} setFilterDateFrom={setFilterDateFrom} filterDateTo={filterDateTo} setFilterDateTo={setFilterDateTo} stations={stations}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
      <StatCard label="觀察總次數" value={records.length} color="var(--blue)"/>
      <StatCard label="發掘問題點" value={allIssues.length} color="var(--yellow)"/>
      <StatCard label="已改善" value={allIssues.filter(i=>i.status==="已改善").length} color="var(--green)"/>
      <StatCard label="未改善" value={allIssues.filter(i=>i.status==="未改善").length} color="var(--red)"/>
    </div>
    <SectionTitle>遵守度分布</SectionTitle>
    <div style={{display:"flex",gap:8,marginBottom:20}}>{Object.entries(compDist).map(([g,c])=><div key={g} style={{flex:1,background:"var(--card)",borderRadius:12,padding:"12px 8px",textAlign:"center",border:`1px solid ${CC[g]}30`}}><div style={{fontSize:24,fontWeight:900,color:CC[g]}}>{c}</div><div style={{fontSize:12,color:"#888",marginTop:2}}>{g}級</div></div>)}</div>
    <SectionTitle>各工站問題數</SectionTitle>
    <div style={{background:"var(--card)",borderRadius:12,padding:16,marginBottom:20}}>
      {Object.entries(stationIssues).length===0&&<div style={{color:"#555",fontSize:13}}>尚無資料</div>}
      {Object.entries(stationIssues).map(([st,v])=>{const max=Math.max(...Object.values(stationIssues).map(x=>x.total),1);return <div key={st} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{fontWeight:600}}>{st}</span><span style={{color:"#888"}}>{v.total}件</span></div><div style={{display:"flex",height:18,borderRadius:9,overflow:"hidden",background:"var(--bg)"}}>{v.improved>0&&<div style={{width:`${(v.improved/max)*100}%`,background:SC.improved}}/>}{v.inProgress>0&&<div style={{width:`${(v.inProgress/max)*100}%`,background:SC.inProgress}}/>}{v.pending>0&&<div style={{width:`${(v.pending/max)*100}%`,background:SC.pending}}/>}</div></div>;})}
      <div style={{display:"flex",gap:16,marginTop:8,fontSize:10,color:"#888"}}>{["已改善","改善中","未改善"].map(k=><span key={k} style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:4,background:k==="已改善"?SC.improved:k==="改善中"?SC.inProgress:SC.pending,display:"inline-block"}}/>{k}</span>)}</div>
    </div>
    <SectionTitle>問題項目排行</SectionTitle>
    <div style={{background:"var(--card)",borderRadius:12,padding:16}}>
      {sortedItems.length===0&&<div style={{color:"#555",fontSize:13}}>尚無問題</div>}
      {sortedItems.map(([key,v],i)=>{const item=checkItems.find(c=>c.id===key);const total=v.fail+v.pass;const pct=total>0?Math.round((v.fail/total)*100):0;return <div key={key} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:22,height:22,borderRadius:11,background:i===0?"var(--red)":i===1?"var(--yellow)":"#333",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item?.label||key}</div><div style={{height:6,borderRadius:3,background:"var(--bg)",marginTop:4}}><div style={{height:6,borderRadius:3,background:"linear-gradient(90deg,#ef4444,#f59e0b)",width:`${pct}%`}}/></div></div><div style={{fontSize:12,fontWeight:700,color:"var(--red)",flexShrink:0}}>{v.fail}<span style={{color:"#555",fontWeight:400}}>/{total}</span></div></div>;})}
    </div>
  </div>;
}

/* ═══ RECORD LIST ═══ */
function RecordList({records,filterStation,setFilterStation,onEdit,onDelete,perm,users,stations,checkItems}){
  return <div className="fade-in">
    <div style={{marginBottom:12}}><select value={filterStation} onChange={e=>setFilterStation(e.target.value)} style={S.sel}><option value="全部">全部工站</option>{stations.map(s=><option key={s}>{s}</option>)}</select></div>
    {records.length===0&&<div style={{textAlign:"center",color:"#555",padding:40}}>尚無紀錄</div>}
    {[...records].reverse().map(r=>{const creator=users.find(u=>u.id===r.createdBy);return <div key={r.id} style={{background:"var(--card)",borderRadius:12,padding:14,marginBottom:10,border:"1px solid var(--border)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div><span style={{fontSize:13,fontWeight:700}}>{r.station}</span><span style={{fontSize:11,color:"#888",marginLeft:8}}>{r.date}</span></div><span style={{background:CC[r.compliance]+"25",color:CC[r.compliance],padding:"2px 10px",borderRadius:99,fontSize:12,fontWeight:700}}>{r.compliance}</span></div>
      <div style={{fontSize:12,color:"#aaa",marginBottom:4}}>{r.carModel} · {r.partName} · {r.operator} {r.personnelChange&&<span style={{color:"var(--yellow)"}}>（人員變更）</span>}</div>
      {creator&&<div style={{fontSize:10,color:"#555",marginBottom:6}}>紀錄者: {creator.name}</div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>{Object.entries(r.checks||{}).map(([k,v])=>{if(v!=="X")return null;const it=checkItems.find(c=>c.id===k);return <span key={k} style={{background:"#ef444420",color:"var(--red)",fontSize:10,padding:"2px 6px",borderRadius:4}}>{it?.short||k}</span>;})}{Object.values(r.checks||{}).filter(v=>v==="X").length===0&&<span style={{fontSize:11,color:"var(--green)"}}>✓ 全數通過</span>}</div>
      {(perm?.canEdit||perm?.canDelete)&&<div style={{display:"flex",gap:8}}>{perm?.canEdit&&<button onClick={()=>onEdit(r)} style={S.btnSm}>編輯</button>}{perm?.canDelete&&<button onClick={()=>confirm("確定刪除？")&&onDelete(r.id)} style={{...S.btnSm,color:"var(--red)",background:"#ef444415"}}>刪除</button>}</div>}
    </div>;})}
  </div>;
}

/* ═══ ISSUE TRACKER ═══ */
function IssueTracker({records,onUpdateIssue,filterStation,setFilterStation,perm,stations,checkItems}){
  const allIssues=[];records.forEach(r=>{if(filterStation!=="全部"&&r.station!==filterStation)return;(r.issues||[]).forEach((iss,idx)=>allIssues.push({...iss,recordId:r.id,issueIdx:idx,station:r.station,date:r.date,operator:r.operator}));});
  const[sf,setSf]=useState("全部");const shown=sf==="全部"?allIssues:allIssues.filter(i=>i.status===sf);
  return <div className="fade-in">
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
      <select value={filterStation} onChange={e=>setFilterStation(e.target.value)} style={S.sel}><option value="全部">全部工站</option>{stations.map(s=><option key={s}>{s}</option>)}</select>
      <select value={sf} onChange={e=>setSf(e.target.value)} style={S.sel}><option value="全部">全部狀態</option><option>已改善</option><option>改善中</option><option>未改善</option></select>
    </div>
    {shown.length===0&&<div style={{textAlign:"center",color:"#555",padding:40}}>無符合條件的問題</div>}
    {shown.map((iss,i)=>{const it=checkItems.find(c=>c.id===iss.item);const sc=iss.status==="已改善"?SC.improved:iss.status==="改善中"?SC.inProgress:SC.pending;return <div key={i} style={{background:"var(--card)",borderRadius:12,padding:14,marginBottom:10,borderLeft:`3px solid ${sc}`}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:700}}>{it?.label||iss.item}</span>{perm?.canEditIssue?<select value={iss.status} onChange={e=>onUpdateIssue(iss.recordId,iss.issueIdx,"status",e.target.value)} style={{...S.sel,fontSize:11,padding:"2px 8px",color:sc,background:"var(--bg)"}}><option>未改善</option><option>改善中</option><option>已改善</option></select>:<span style={{fontSize:11,color:sc,fontWeight:600}}>{iss.status}</span>}</div>
      <div style={{fontSize:11,color:"#888",marginBottom:4}}>{iss.station} · {iss.date} · {iss.operator}</div>
      <div style={{fontSize:12,color:"#ccc",marginBottom:8}}>{iss.desc||"（無描述）"}</div>
      {perm?.canEditIssue?<><input type="date" value={iss.improveDate||""} onChange={e=>onUpdateIssue(iss.recordId,iss.issueIdx,"improveDate",e.target.value)} style={{...S.sel,width:"100%",fontSize:11,boxSizing:"border-box"}}/><input value={iss.improveNote||""} onChange={e=>onUpdateIssue(iss.recordId,iss.issueIdx,"improveNote",e.target.value)} placeholder="改善對策說明..." style={{...S.sel,width:"100%",marginTop:6,fontSize:12,boxSizing:"border-box"}}/></>:<>{iss.improveDate&&<div style={{fontSize:11,color:"#666"}}>預計改善: {iss.improveDate}</div>}{iss.improveNote&&<div style={{fontSize:12,color:"#888",marginTop:4}}>{iss.improveNote}</div>}</>}
    </div>;})}
  </div>;
}

/* ═══ RECORD FORM - 卡片式一頁一項 ═══ */
function RecordForm({record,onSave,currentUser,stations,supervisors,checkItems}){
  const blank={date:td(),station:stations[0]||"",carModel:"",partName:"",operator:"",personnelChange:false,checks:Object.fromEntries(checkItems.map(c=>[c.id,"O"])),compliance:"A",supervisor:currentUser?.name||supervisors[0]||"",managerConfirm:false,issues:[]};
  const[form,setForm]=useState(record?{...record,checks:{...Object.fromEntries(checkItems.map(c=>[c.id,"O"])),...(record.checks||{})}}:blank);
  const[step,setStep]=useState(0);const[cardIdx,setCardIdx]=useState(0);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setCheck=(k,v)=>setForm(f=>({...f,checks:{...f.checks,[k]:v}}));
  const failCount=Object.values(form.checks).filter(v=>v==="X").length;
  const applicableCount=Object.values(form.checks).filter(v=>v!=="一").length;
  const failRate=applicableCount>0?failCount/applicableCount:0;
  const calcGrade=()=>failCount===0?"A":failRate<=0.05?"B":failRate<=0.15?"C":"D";

  useEffect(()=>{
    if(step===2){
      const failItems=Object.entries(form.checks).filter(([,v])=>v==="X");
      const newIssues=failItems.filter(([k])=>!form.issues.some(i=>i.item===k)).map(([k])=>({item:k,desc:"",status:"未改善",improveDate:"",improveNote:""}));
      if(newIssues.length>0)set("issues",[...form.issues.filter(i=>form.checks[i.item]==="X"),...newIssues]);
      set("compliance",calcGrade());
    }
  },[step]);

  const curItem=checkItems[cardIdx];
  const progress=checkItems.length>0?Math.round(((cardIdx+1)/checkItems.length)*100):0;

  return <div className="fade-in">
    <div style={{display:"flex",gap:6,marginBottom:16}}>
      {["基本資訊","確認項目","問題&儲存"].map((l,i)=><div key={i} onClick={()=>{setStep(i);if(i===1)setCardIdx(0);}} style={{flex:1,padding:"8px 4px",textAlign:"center",fontSize:11,fontWeight:step===i?700:400,background:step===i?"#60a5fa20":"var(--card)",color:step===i?"var(--blue)":"#666",borderRadius:8,cursor:"pointer",border:step===i?"1px solid #60a5fa40":"1px solid transparent"}}>{l}</div>)}
    </div>

    {/* Step 0: 基本資訊 */}
    {step===0&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Field label="確認日期"><input type="date" value={form.date} onChange={e=>set("date",e.target.value)} style={S.input}/></Field>
      <Field label="作業工站"><select value={form.station} onChange={e=>set("station",e.target.value)} style={S.input}>{stations.map(s=><option key={s}>{s}</option>)}</select></Field>
      <Field label="車型"><input value={form.carModel} onChange={e=>set("carModel",e.target.value)} placeholder="例: CX-5" style={S.input}/></Field>
      <Field label="零件名稱"><input value={form.partName} onChange={e=>set("partName",e.target.value)} placeholder="例: 前保桿" style={S.input}/></Field>
      <Field label="作業人員"><input value={form.operator} onChange={e=>set("operator",e.target.value)} placeholder="例: 陳OO" style={S.input}/></Field>
      <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}><input type="checkbox" checked={form.personnelChange} onChange={e=>set("personnelChange",e.target.checked)}/> 人員變更</label>
      <Field label="確認幹部"><select value={form.supervisor} onChange={e=>set("supervisor",e.target.value)} style={S.input}>{supervisors.map(s=><option key={s}>{s}</option>)}</select></Field>
      <button onClick={()=>{setStep(1);setCardIdx(0);}} style={S.btn}>下一步：開始點檢 →</button>
    </div>}

    {/* Step 1: 卡片式一頁一項 */}
    {step===1&&curItem&&<div>
      {/* Progress bar */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#888",marginBottom:6}}>
          <span>第 {cardIdx+1} / {checkItems.length} 項</span>
          <span>{progress}%</span>
        </div>
        <div style={{height:4,borderRadius:2,background:"#333"}}>
          <div style={{height:4,borderRadius:2,background:"var(--blue)",width:`${progress}%`,transition:"width .3s"}}/>
        </div>
      </div>

      {/* Card */}
      <div key={curItem.id} className="card-anim" style={{background:"var(--card)",borderRadius:16,padding:24,minHeight:220,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:"1px solid #ffffff10",marginBottom:16}}>
        <div style={{fontSize:11,color:"#555",marginBottom:8,textTransform:"uppercase",letterSpacing:2}}>確認項目</div>
        <div style={{fontSize:20,fontWeight:700,textAlign:"center",lineHeight:1.5,marginBottom:32,padding:"0 8px"}}>{curItem.label}</div>
        <div style={{display:"flex",gap:12,width:"100%",maxWidth:320}}>
          {[{v:"O",label:"落實",color:"var(--green)",bg:"#22c55e"},{v:"一",label:"無此工序",color:"#888",bg:"#555"},{v:"X",label:"未落實",color:"var(--red)",bg:"#ef4444"}].map(({v,label,color,bg})=>(
            <button key={v} onClick={()=>setCheck(curItem.id,v)} style={{flex:1,padding:"16px 8px",borderRadius:12,border:form.checks[curItem.id]===v?`3px solid ${color}`:"2px solid #333",background:form.checks[curItem.id]===v?bg+"20":"transparent",color,fontSize:16,fontWeight:900,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:24}}>{v}</span>
              <span style={{fontSize:10,fontWeight:500}}>{label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Navigation */}
      <div style={{display:"flex",gap:8}}>
        {cardIdx>0&&<button onClick={()=>setCardIdx(i=>i-1)} style={{...S.btn,background:"#333",color:"#aaa",flex:1}}>← 上一項</button>}
        {cardIdx<checkItems.length-1?
          <button onClick={()=>setCardIdx(i=>i+1)} style={{...S.btn,flex:1}}>下一項 →</button>:
          <button onClick={()=>setStep(2)} style={{...S.btn,flex:1,background:CC[calcGrade()],position:"relative"}}>
            完成點檢 → 判定：{calcGrade()}級
            {failCount>0&&<span style={{position:"absolute",top:-6,right:-6,background:"var(--red)",color:"#fff",borderRadius:99,width:22,height:22,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{failCount}</span>}
          </button>
        }
      </div>

      {/* Quick jump dots */}
      <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:12,flexWrap:"wrap"}}>
        {checkItems.map((item,i)=>{const v=form.checks[item.id];return <button key={i} onClick={()=>setCardIdx(i)} style={{width:20,height:20,borderRadius:10,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,background:i===cardIdx?"var(--blue)":v==="X"?"var(--red)":v==="O"?"#22c55e40":"#333",color:i===cardIdx?"#fff":v==="X"?"#fff":"#888"}}>{i+1}</button>;})}
      </div>
    </div>}

    {/* Step 2: 問題 & 儲存 */}
    {step===2&&<div>
      {failCount>0&&<SectionTitle>問題點紀錄 ({form.issues.length})</SectionTitle>}
      {form.issues.map((iss,idx)=>{const it=checkItems.find(c=>c.id===iss.item);return <div key={idx} style={{background:"var(--card)",borderRadius:10,padding:12,marginBottom:10,borderLeft:"3px solid var(--red)"}}><div style={{fontSize:13,fontWeight:600,marginBottom:8,color:"var(--red)"}}>{it?.label||iss.item}</div><input value={iss.desc} onChange={e=>{const u=[...form.issues];u[idx]={...u[idx],desc:e.target.value};set("issues",u);}} placeholder="問題描述..." style={{...S.input,marginBottom:6}}/><select value={iss.status} onChange={e=>{const u=[...form.issues];u[idx]={...u[idx],status:e.target.value};set("issues",u);}} style={S.input}><option>未改善</option><option>改善中</option><option>已改善</option></select></div>;})}
      {failCount===0&&<div style={{textAlign:"center",color:"var(--green)",padding:30,fontSize:14}}>✓ 本次觀察無異常項目</div>}
      <Field label="作業遵守度（自動判定）" style={{marginTop:12,marginBottom:12}}>
        <div style={{background:"var(--card)",borderRadius:12,padding:16,textAlign:"center",border:`2px solid ${CC[form.compliance]}`}}>
          <div style={{fontSize:40,fontWeight:900,color:CC[form.compliance]}}>{form.compliance}</div>
          <div style={{fontSize:12,color:"#aaa",marginTop:4}}>
            不合格 {failCount}/{applicableCount} 項（{applicableCount>0?Math.round(failRate*100):0}%）
            {form.compliance==="A"?" — 全數落實":form.compliance==="B"?" — 輕微缺失(≤5%)":form.compliance==="C"?" — 需加強(≤15%)":" — 嚴重不合格(>15%)"}
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:12}}>
            {["A","B","C","D"].map(g=><div key={g} style={{width:32,height:32,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,background:form.compliance===g?CC[g]:"#222",color:form.compliance===g?"#fff":"#555"}}>{g}</div>)}
          </div>
        </div>
      </Field>
      <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,marginBottom:16}}><input type="checkbox" checked={form.managerConfirm} onChange={e=>set("managerConfirm",e.target.checked)}/> 科長已確認</label>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{setStep(1);setCardIdx(0);}} style={{...S.btn,background:"#333",color:"#aaa",flex:1}}>← 返回點檢</button>
        <button onClick={()=>onSave(form)} style={{...S.btn,flex:1,background:"var(--green)"}}>💾 儲存紀錄</button>
      </div>
    </div>}
  </div>;
}

/* ═══ MAIN APP ═══ */
function App(){
  const[currentUser,setCurrentUser]=useState(null);
  const[users,setUsers]=useState([]);
  const[records,setRecords]=useState([]);
  const[stations,setStations]=useState(DEFAULT_STATIONS);
  const[checkItems,setCheckItems]=useState(DEFAULT_CHECK_ITEMS);
  const[page,setPage]=useState("dashboard");
  const[editingRecord,setEditingRecord]=useState(null);
  const[filterStation,setFilterStation]=useState("全部");
  const[filterDateFrom,setFilterDateFrom]=useState("");
  const[filterDateTo,setFilterDateTo]=useState("");
  const[toast,setToast]=useState("");
  const[syncing,setSyncing]=useState(false);
  const useCloud=!!API_URL;

  useEffect(()=>{(async()=>{
    if(useCloud){
      setSyncing(true);
      const[recs,cfg,usrs]=await Promise.all([api.getRecords(),api.getConfig(),api.getUsers()]);
      if(recs?.records)setRecords(recs.records);
      if(cfg?.stations)setStations(cfg.stations);
      if(cfg?.checkItems)setCheckItems(cfg.checkItems);
      if(usrs?.users?.length)setUsers(usrs.users.map(u=>({...u,pin:String(u.pin).padStart(4,'0')})));else setUsers(DEFAULT_USERS);
      setSyncing(false);
    }else{
      setRecords(await LS.get("obs-rec",DEMO_DATA));
      const lsUsers=await LS.get("obs-usr",DEFAULT_USERS);setUsers(lsUsers.map(u=>({...u,pin:String(u.pin).padStart(4,'0')})));
      const cfg=await LS.get("obs-cfg",{});
      if(cfg.stations)setStations(cfg.stations);
      if(cfg.checkItems)setCheckItems(cfg.checkItems);
    }
  })();},[]);

  const saveRec=useCallback(async d=>{if(!useCloud)await LS.set("obs-rec",d);},[useCloud]);
  const saveUsr=useCallback(async d=>{if(useCloud)await api.saveUsers(d);else await LS.set("obs-usr",d);},[useCloud]);
  const saveCfg=useCallback(async(st,ci)=>{const c={stations:st,checkItems:ci};if(useCloud)await api.saveConfig(c);else await LS.set("obs-cfg",c);},[useCloud]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2200);};
  const perm=currentUser?ROLES[currentUser.role]:null;
  const supervisors=useMemo(()=>users.filter(u=>u.role==="supervisor"||u.role==="manager").map(u=>u.name),[users]);

  const filtered=useMemo(()=>records.filter(r=>{
    if(filterStation!=="全部"&&r.station!==filterStation)return false;
    if(filterDateFrom&&r.date<filterDateFrom)return false;
    if(filterDateTo&&r.date>filterDateTo)return false;
    return true;
  }),[records,filterStation,filterDateFrom,filterDateTo]);

  const handleSaveRecord=async rec=>{
    let updated;
    if(rec.id&&records.some(r=>r.id===rec.id)){updated=records.map(r=>r.id===rec.id?rec:r);}
    else{rec.id=Date.now();rec.createdBy=currentUser?.id||"unknown";updated=[...records,rec];}
    setRecords(updated);
    if(useCloud){const res=await api.saveRecord(rec);console.log("saveRecord result:",res);}else await saveRec(updated);
    showToast("紀錄已儲存 ✓");setPage("records");setEditingRecord(null);
  };
  const handleDelete=async id=>{const u=records.filter(r=>r.id!==id);setRecords(u);if(useCloud)await api.deleteRecord(id);else await saveRec(u);showToast("已刪除");};
  const handleUpdateIssue=async(recordId,issueIdx,field,value)=>{
    const updated=records.map(r=>{if(r.id===recordId){const issues=[...r.issues];issues[issueIdx]={...issues[issueIdx],[field]:value};return{...r,issues};}return r;});
    setRecords(updated);
    if(useCloud){await api.updateIssue(recordId,issueIdx,field,value);}else await saveRec(updated);
  };
  const handleUpdateStations=ns=>{setStations(ns);saveCfg(ns,checkItems);showToast("工站已更新");};
  const handleUpdateCheckItems=nc=>{setCheckItems(nc);saveCfg(stations,nc);showToast("確認項目已更新");};
  const handleReset=async()=>{if(!confirm("確定要重置？"))return;setRecords(DEMO_DATA);setUsers(DEFAULT_USERS);setStations(DEFAULT_STATIONS);setCheckItems(DEFAULT_CHECK_ITEMS);if(!useCloud){await saveRec(DEMO_DATA);await saveUsr(DEFAULT_USERS);await saveCfg(DEFAULT_STATIONS,DEFAULT_CHECK_ITEMS);}showToast("已重置");};
  const handleAddUser=u=>{const n=[...users,{...u,id:"u"+Date.now()}];setUsers(n);saveUsr(n);showToast("已新增帳號");};
  const handleDeleteUser=id=>{if(id==="admin")return showToast("無法刪除系統管理者");const n=users.filter(x=>x.id!==id);setUsers(n);saveUsr(n);showToast("已刪除帳號");};
  const handleUpdateUser=(id,upd)=>{const n=users.map(x=>x.id===id?{...x,...upd}:x);setUsers(n);saveUsr(n);showToast("已更新");};

  if(!currentUser)return <LoginScreen users={users} onLogin={setCurrentUser} syncing={syncing} useCloud={useCloud}/>;

  const navItems=[["dashboard","📊 儀表板",true],["records","📋 紀錄",true],["issues","⚠️ 改善",true],["add","＋ 新增",perm?.canAdd],...(perm?.canManageUsers?[["users","👤 帳號",true]]:[]),...(perm?.canSettings?[["settings","⚙ 設定",true]]:[])].filter(x=>x[2]);

  return <div style={{background:"var(--bg)",color:"var(--text)",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"}}>
    {toast&&<div className="toast-anim" style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"var(--green)",color:"#fff",padding:"10px 24px",borderRadius:99,fontSize:14,fontWeight:600,zIndex:999,boxShadow:"0 4px 20px #22c55e55",whiteSpace:"nowrap"}}>{toast}</div>}
    <header style={{background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)",padding:"16px 16px 10px",borderBottom:"1px solid var(--border)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:10,fontWeight:300,color:"var(--blue)",letterSpacing:3,textTransform:"uppercase"}}>Manufacturing Observation</div><h1 style={{fontSize:18,fontWeight:900,margin:"2px 0 0",background:"linear-gradient(90deg,#f0f0f0,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>製造作業觀察系統</h1></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:600}}>{currentUser.name}</div><div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end",marginTop:2}}>{useCloud&&<span style={{fontSize:9,color:"var(--green)",background:"#22c55e20",padding:"1px 6px",borderRadius:99}}>☁</span>}<span style={{fontSize:10,color:ROLES[currentUser.role].color,background:ROLES[currentUser.role].color+"20",padding:"1px 8px",borderRadius:99,fontWeight:600}}>{ROLES[currentUser.role].label}</span><button onClick={()=>{setCurrentUser(null);setPage("dashboard");}} style={{fontSize:10,color:"var(--red)",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>登出</button></div></div>
      </div>
    </header>
    <nav style={{display:"flex",background:"#16182a",borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
      {navItems.map(([k,l])=><button key={k} onClick={()=>{setPage(k);if(k==="add")setEditingRecord(null);}} style={{flex:1,padding:"11px 2px",fontSize:11,fontWeight:page===k?700:400,background:page===k?"#60a5fa15":"transparent",color:page===k?"var(--blue)":"#888",border:"none",borderBottom:page===k?"2px solid var(--blue)":"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap",minWidth:0}}>{l}</button>)}
    </nav>
    <main style={{padding:16,paddingBottom:60}}>
      {page==="dashboard"&&<Dashboard records={filtered} filterStation={filterStation} setFilterStation={setFilterStation} filterDateFrom={filterDateFrom} setFilterDateFrom={setFilterDateFrom} filterDateTo={filterDateTo} setFilterDateTo={setFilterDateTo} stations={stations} checkItems={checkItems}/>}
      {page==="records"&&<RecordList records={filtered} filterStation={filterStation} setFilterStation={setFilterStation} onEdit={r=>{setEditingRecord(r);setPage("add");}} onDelete={handleDelete} perm={perm} users={users} stations={stations} checkItems={checkItems}/>}
      {page==="issues"&&<IssueTracker records={records} onUpdateIssue={handleUpdateIssue} filterStation={filterStation} setFilterStation={setFilterStation} perm={perm} stations={stations} checkItems={checkItems}/>}
      {page==="add"&&<RecordForm record={editingRecord} onSave={handleSaveRecord} currentUser={currentUser} stations={stations} supervisors={supervisors} checkItems={checkItems}/>}
      {page==="users"&&<UserManager users={users} onAdd={handleAddUser} onDelete={handleDeleteUser} onUpdate={handleUpdateUser}/>}
      {page==="settings"&&<SettingsPage stations={stations} onUpdateStations={handleUpdateStations} checkItems={checkItems} onUpdateCheckItems={handleUpdateCheckItems} onReset={handleReset} useCloud={useCloud}/>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
